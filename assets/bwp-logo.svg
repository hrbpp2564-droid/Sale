<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" role="img" aria-label="BWP">
  <defs>
    <radialGradient id="bwpSphere" cx="38%" cy="32%" r="75%">
      <stop offset="0%" stop-color="#bfe0ff"/>
      <stop offset="42%" stop-color="#3fa0f5"/>
      <stop offset="100%" stop-color="#0b4bb8"/>
    </radialGradient>
    <linearGradient id="bwpText" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1b2a6b"/>
      <stop offset="100%" stop-color="#0d1640"/>
    </linearGradient>
    <clipPath id="bwpClip"><circle cx="24" cy="24" r="22"/></clipPath>
  </defs>
  <!-- sphere -->
  <circle cx="24" cy="24" r="22" fill="url(#bwpSphere)"/>
  <!-- lat / long grid -->
  <g clip-path="url(#bwpClip)" fill="none" stroke="#dceefe" stroke-opacity="0.55" stroke-width="0.7">
    <ellipse cx="24" cy="24" rx="22" ry="9"/>
    <ellipse cx="24" cy="24" rx="22" ry="17"/>
    <ellipse cx="24" cy="24" rx="9"  ry="22"/>
    <ellipse cx="24" cy="24" rx="17" ry="22"/>
    <line x1="2" y1="24" x2="46" y2="24"/>
    <line x1="24" y1="2" x2="24" y2="46"/>
    <path d="M6 13 Q24 4 42 13" />
    <path d="M6 35 Q24 44 42 35" />
  </g>
  <!-- glossy highlight -->
  <ellipse cx="17" cy="15" rx="11" ry="6" fill="#ffffff" fill-opacity="0.22" clip-path="url(#bwpClip)"/>
  <!-- wordmark -->
  <text x="24" y="24" text-anchor="middle" dominant-baseline="central"
        font-family="Georgia, 'Times New Roman', serif" font-weight="700"
        font-size="17" letter-spacing="-0.5"
        fill="url(#bwpText)" stroke="#cfe6ff" stroke-width="0.5" paint-order="stroke">BWP</text>
</svg>
