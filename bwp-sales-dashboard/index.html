/* tokens/fonts.css */
/* Vantage typeface — IBM Plex Sans Thai (UI) + IBM Plex Mono (numerics)
   Loaded from Google Fonts. IBM Plex Sans Thai is the real, intended family —
   it carries full Thai + Latin glyph coverage and tabular Latin numerals.
   If you self-host, drop the .woff2 files in /assets/fonts and replace this @import
   with local @font-face rules. */



/* tokens/colors.css */
/* ============================================================
   VANTAGE — COLOR SYSTEM
   Dark-first executive palette. Base ramps + semantic aliases.
   Dark = :root (default). Light = [data-theme="light"].
   ============================================================ */

:root {
  /* ---- Base neutral ramp (cool slate, dark) ---- */
  --slate-950: #090b10;
  --slate-900: #0b0e14;
  --slate-850: #0d1117;
  --slate-800: #12161f;
  --slate-750: #161b24;
  --slate-700: #1b212c;
  --slate-650: #222937;
  --slate-600: #2c3442;
  --slate-500: #3a4452;
  --slate-400: #5f6b7a;
  --slate-300: #8b97a5;
  --slate-200: #aab5c1;
  --slate-100: #cdd5dd;
  --slate-50:  #e6edf3;

  /* ---- Brand accent: electric blue ---- */
  --blue-700: #1858c7;
  --blue-600: #1f6feb;
  --blue-500: #388bfd;
  --blue-400: #58a6ff;
  --blue-300: #79c0ff;

  /* ---- Semantic hues ---- */
  --green-600: #238636;
  --green-500: #2ea043;
  --green-400: #3fb950;
  --red-600:   #cf3a32;
  --red-500:   #f85149;
  --red-400:   #ff7b72;
  --amber-600: #bb8009;
  --amber-500: #d29922;
  --amber-400: #e3b341;

  /* ---- Categorical data-viz palette (8 hues, tuned for dark) ---- */
  --viz-1: #1f6feb;  /* blue   — primary series (value/บาท) */
  --viz-2: #3fb950;  /* green  — secondary series (volume/Kg) */
  --viz-3: #e3b341;  /* amber  */
  --viz-4: #a371f7;  /* purple */
  --viz-5: #56d4dd;  /* cyan   */
  --viz-6: #f778ba;  /* pink   */
  --viz-7: #f0883e;  /* orange */
  --viz-8: #6e7bf2;  /* indigo */

  /* =========================================================
     SEMANTIC ALIASES (dark)  — reference these in components
     ========================================================= */

  /* Surfaces */
  --bg-app:        var(--slate-900);
  --bg-base:       var(--slate-850);
  --surface-1:     var(--slate-800);   /* default card */
  --surface-2:     var(--slate-750);   /* raised / nested */
  --surface-3:     var(--slate-700);   /* hover / active row */
  --surface-inset: var(--slate-950);   /* wells, code, chart bg */
  --surface-overlay: #11161fee;        /* dialogs/popovers */

  /* Borders */
  --border-subtle:  rgba(255,255,255,0.06);
  --border-default: rgba(255,255,255,0.10);
  --border-strong:  rgba(255,255,255,0.16);
  --border-accent:  var(--blue-600);

  /* Text */
  --text-primary:   var(--slate-50);
  --text-secondary: var(--slate-300);
  --text-tertiary:  var(--slate-400);
  --text-disabled:  var(--slate-500);
  --text-inverse:   #0b0e14;
  --text-on-accent: #ffffff;
  --text-link:      var(--blue-400);

  /* Accent */
  --accent:         var(--blue-600);
  --accent-hover:   var(--blue-500);
  --accent-press:   var(--blue-700);
  --accent-fg:      #ffffff;
  --accent-subtle:  rgba(31,111,235,0.16);
  --accent-ring:    rgba(56,139,253,0.45);

  /* Status (positive growth / negative growth / caution) */
  --positive:        var(--green-400);
  --positive-fg:     #ffffff;
  --positive-subtle: rgba(63,185,80,0.15);
  --negative:        var(--red-500);
  --negative-fg:     #ffffff;
  --negative-subtle: rgba(248,81,73,0.15);
  --warning:         var(--amber-500);
  --warning-subtle:  rgba(210,153,34,0.16);
  --info:            var(--blue-400);
  --info-subtle:     rgba(88,166,255,0.14);

  /* Chart scaffolding */
  --chart-grid:   rgba(255,255,255,0.06);
  --chart-axis:   var(--slate-400);
  --chart-bg:     transparent;
}

/* tokens/typography.css */
/* ============================================================
   VANTAGE — TYPOGRAPHY
   IBM Plex Sans Thai for UI text, IBM Plex Mono for numerics.
   Tabular numerals everywhere numbers are compared (KPIs, tables).
   ============================================================ */

:root {
  /* Families */
  --font-sans: 'IBM Plex Sans Thai', 'IBM Plex Sans Thai Looped', -apple-system,
               'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
  --font-numeric: 'IBM Plex Mono', 'IBM Plex Sans Thai', ui-monospace,
                  'SFMono-Regular', Menlo, monospace;
  --font-mono: 'IBM Plex Mono', ui-monospace, 'SFMono-Regular', Menlo, monospace;

  /* Type scale (px) — compact, data-dense executive UI */
  --text-2xs: 11px;
  --text-xs:  12px;
  --text-sm:  13px;
  --text-base:14px;
  --text-md:  15px;
  --text-lg:  17px;
  --text-xl:  20px;
  --text-2xl: 24px;
  --text-3xl: 30px;
  --text-4xl: 38px;
  --text-5xl: 48px;   /* hero KPI figures */
  --text-6xl: 60px;

  /* Weights */
  --weight-light:    300;
  --weight-regular:  400;
  --weight-medium:   500;
  --weight-semibold: 600;
  --weight-bold:     700;

  /* Line heights */
  --leading-tight:   1.15;
  --leading-snug:    1.3;
  --leading-normal:  1.5;
  --leading-relaxed: 1.65;

  /* Letter spacing */
  --tracking-tight:  -0.01em;
  --tracking-normal: 0;
  --tracking-wide:   0.04em;
  --tracking-caps:   0.08em;  /* eyebrows / overline labels */

  /* Numeric feature shorthand (apply to number-bearing elements) */
  --num-features: "tnum" 1, "lnum" 1;  /* @kind other */
}

/* Convenience utility classes (optional; components mostly use vars directly) */
.v-num {
  font-family: var(--font-numeric);
  font-feature-settings: var(--num-features);
  font-variant-numeric: tabular-nums lining-nums;
  letter-spacing: var(--tracking-tight);
}
.v-eyebrow {
  font-size: var(--text-2xs);
  font-weight: var(--weight-semibold);
  letter-spacing: var(--tracking-caps);
  text-transform: uppercase;
  color: var(--text-tertiary);
}

/* tokens/spacing.css */
/* ============================================================
   VANTAGE — SPACING, RADII, SHADOWS, MOTION, LAYOUT
   4px base grid.
   ============================================================ */

:root {
  /* Spacing scale (4px base) */
  --space-0:  0;
  --space-1:  4px;
  --space-2:  8px;
  --space-3:  12px;
  --space-4:  16px;
  --space-5:  20px;
  --space-6:  24px;
  --space-8:  32px;
  --space-10: 40px;
  --space-12: 48px;
  --space-16: 64px;
  --space-20: 80px;

  /* Radii */
  --radius-xs:   3px;
  --radius-sm:   5px;
  --radius-md:   8px;
  --radius-lg:   12px;
  --radius-xl:   16px;
  --radius-2xl:  20px;
  --radius-full: 999px;

  /* Border widths */
  --border-w: 1px;
  --border-w-thick: 1.5px;

  /* Shadows (dark-tuned: deep, low-spread) */
  --shadow-xs: 0 1px 2px rgba(0,0,0,0.40);
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.45), 0 1px 2px rgba(0,0,0,0.30);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.45), 0 2px 4px rgba(0,0,0,0.30);
  --shadow-lg: 0 12px 32px rgba(0,0,0,0.55), 0 4px 10px rgba(0,0,0,0.35);
  --shadow-xl: 0 24px 64px rgba(0,0,0,0.60);
  --shadow-accent-glow: 0 0 0 1px rgba(56,139,253,0.30), 0 6px 22px rgba(31,111,235,0.28);

  /* Focus ring */
  --focus-ring: 0 0 0 2px var(--bg-app), 0 0 0 4px var(--accent-ring);

  /* Motion */
  --ease-out: cubic-bezier(0.16, 1, 0.3, 1);      /* @kind other */
  --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);  /* @kind other */
  --ease-standard: cubic-bezier(0.4, 0, 0.2, 1);  /* @kind other */
  --dur-fast: 120ms;  /* @kind other */
  --dur-base: 180ms;  /* @kind other */
  --dur-slow: 280ms;  /* @kind other */

  /* Layout */
  --sidebar-w: 248px;
  --sidebar-w-collapsed: 64px;
  --topbar-h: 60px;
  --filterbar-h: 52px;
  --content-max: 1600px;
  --z-sticky: 100;   /* @kind other */
  --z-overlay: 500;  /* @kind other */
  --z-toast: 800;    /* @kind other */
}

/* Light theme softens shadows */
[data-theme="light"] {
  --shadow-xs: 0 1px 2px rgba(16,22,30,0.06);
  --shadow-sm: 0 1px 3px rgba(16,22,30,0.08), 0 1px 2px rgba(16,22,30,0.04);
  --shadow-md: 0 4px 14px rgba(16,22,30,0.10), 0 2px 4px rgba(16,22,30,0.06);
  --shadow-lg: 0 12px 32px rgba(16,22,30,0.14), 0 4px 10px rgba(16,22,30,0.08);
  --shadow-xl: 0 24px 60px rgba(16,22,30,0.18);
  --shadow-accent-glow: 0 0 0 1px rgba(31,111,235,0.25), 0 6px 22px rgba(31,111,235,0.18);
}

/* tokens/base.css */
/* ============================================================
   VANTAGE — BASE / RESET
   Minimal, applied when consumers opt in via the .vantage class
   on a root element (so we never fight a host page's globals).
   The app shell uses <body class="vantage" data-theme="dark|light">.
   ============================================================ */

.vantage,
.vantage *,
.vantage *::before,
.vantage *::after {
  box-sizing: border-box;
}

.vantage {
  font-family: var(--font-sans);
  font-size: var(--text-base);
  line-height: var(--leading-normal);
  color: var(--text-primary);
  background: var(--bg-app);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  font-feature-settings: "kern" 1;
}

.vantage h1, .vantage h2, .vantage h3,
.vantage h4, .vantage h5, .vantage h6,
.vantage p, .vantage figure {
  margin: 0;
}

.vantage button {
  font-family: inherit;
  cursor: pointer;
}

.vantage a {
  color: var(--text-link);
  text-decoration: none;
}
.vantage a:hover { text-decoration: underline; }

.vantage ::selection {
  background: var(--accent-subtle);
  color: var(--text-primary);
}

/* Custom scrollbars in the app shell */
.vantage ::-webkit-scrollbar { width: 10px; height: 10px; }
.vantage ::-webkit-scrollbar-track { background: transparent; }
.vantage ::-webkit-scrollbar-thumb {
  background: var(--slate-600);
  border-radius: var(--radius-full);
  border: 2px solid transparent;
  background-clip: padding-box;
}
.vantage ::-webkit-scrollbar-thumb:hover { background: var(--slate-500); }

/* Numeric helper available globally */
.vantage .num,
.vantage [data-num] {
  font-family: var(--font-numeric);
  font-variant-numeric: tabular-nums lining-nums;
  letter-spacing: var(--tracking-tight);
}

html, body { margin: 0; height: 100%; }
body { background: var(--bg-app); }
#root { min-height: 100vh; }
#boot { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: var(--bg-app); color: var(--text-tertiary); font-family: var(--font-sans); z-index: 9999; transition: opacity .3s; }
