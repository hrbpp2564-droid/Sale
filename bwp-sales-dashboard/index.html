<!DOCTYPE html>
<html lang="th" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>BWP Vantage — Sales Intelligence</title>
<link rel="stylesheet" href="/Sale/styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<script src="/Sale/_ds_bundle.js"></script>
<script src="/Sale/ui_kits/dashboard/data.js"></script>
<script src="/Sale/ui_kits/dashboard/supabase-config.js"></script>
<script src="/Sale/ui_kits/dashboard/supabase-loader.js"></script>
<script src="/Sale/ui_kits/dashboard/icons.jsx"></script>
<style>
  html, body { margin: 0; height: 100%; }
  body { background: var(--bg-app); }
  #root { min-height: 100vh; }
</style>
</head>
<body class="vantage" data-theme="dark">
<div id="root"></div>
<script type="text/babel" src="/Sale/ui_kits/dashboard/Common.jsx" data-presets="react"></script>
<script type="text/babel" src="/Sale/ui_kits/dashboard/Shell.jsx" data-presets="react"></script>
<script type="text/babel" src="/Sale/ui_kits/dashboard/ScreensA.jsx" data-presets="react"></script>
<script type="text/babel" src="/Sale/ui_kits/dashboard/ScreensB.jsx" data-presets="react"></script>
<script type="text/babel" src="/Sale/ui_kits/dashboard/ScreensC.jsx" data-presets="react"></script>
<script type="text/babel" src="/Sale/ui_kits/dashboard/ScreensD.jsx" data-presets="react"></script>
<script type="text/babel" src="/Sale/ui_kits/dashboard/App.jsx" data-presets="react"></script>
<script>
// Wait for Babel to finish compiling all type="text/babel" scripts, then remount
window.addEventListener('load', function() {
  var attempts = 0;
  function tryRemount() {
    attempts++;
    if (typeof window.__BWP_REMOUNT === 'function') {
      window.__BWP_REMOUNT();
    } else if (attempts < 30) {
      setTimeout(tryRemount, 200);
    }
  }
  setTimeout(tryRemount, 300);
});
</script>
</body>
</html>
