<!-- @dsCard group="Colors" viewport="700x180" name="Dark & Light Themes" subtitle="Same KPI tile under [data-theme] — full parity, dark is primary" -->
<!DOCTYPE html>
<html lang="th">
<head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); display: flex; }
  .pane { flex: 1; padding: 24px; background: var(--bg-app); }
  .tile { background: var(--surface-1); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); padding: 16px 18px; max-width: 240px; }
  .lbl { font-size: 12px; color: var(--text-secondary); }
  .val { font-family: var(--font-numeric); font-size: 32px; font-weight: 600; color: var(--text-primary); letter-spacing: -.01em; margin-top: 10px; }
  .delta { display: inline-flex; align-items: center; gap: 3px; margin-top: 10px; font-family: var(--font-numeric); font-size: 12px; font-weight: 600; color: var(--positive); background: var(--positive-subtle); padding: 2px 7px; border-radius: var(--radius-sm); }
  .tag { font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 14px; }
</style></head>
<body>
  <div class="pane vantage" data-theme="dark">
    <div class="tag">Dark · primary</div>
    <div class="tile"><div class="lbl">มูลค่าขายรวม</div><div class="val">847.2<span style="font-size:14px;color:var(--text-tertiary);font-weight:500"> ลบ.</span></div><div class="delta">▲ +12.4%</div></div>
  </div>
  <div class="pane vantage" data-theme="light">
    <div class="tag">Light</div>
    <div class="tile"><div class="lbl">มูลค่าขายรวม</div><div class="val">847.2<span style="font-size:14px;color:var(--text-tertiary);font-weight:500"> ลบ.</span></div><div class="delta">▲ +12.4%</div></div>
  </div>
</body></html>
