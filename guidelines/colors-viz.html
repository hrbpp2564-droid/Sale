<!-- @dsCard group="Colors" viewport="700x130" name="Data-Viz Palette" subtitle="8 categorical hues for chart series — use in order, tuned for dark surfaces" -->
<!DOCTYPE html>
<html lang="th" data-theme="dark">
<head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-app); font-family: var(--font-sans); }
  .wrap { padding: 22px; display: grid; grid-template-columns: repeat(8, 1fr); gap: 8px; }
  .sw { text-align: center; }
  .chip { height: 56px; border-radius: var(--radius-md); border: 1px solid var(--border-subtle); }
  .name { font-size: 11px; color: var(--text-secondary); margin-top: 7px; font-family: var(--font-numeric); }
</style></head>
<body class="vantage"><div class="wrap">
  <div class="sw"><div class="chip" style="background:var(--viz-1)"></div><div class="name">viz-1</div></div>
  <div class="sw"><div class="chip" style="background:var(--viz-2)"></div><div class="name">viz-2</div></div>
  <div class="sw"><div class="chip" style="background:var(--viz-3)"></div><div class="name">viz-3</div></div>
  <div class="sw"><div class="chip" style="background:var(--viz-4)"></div><div class="name">viz-4</div></div>
  <div class="sw"><div class="chip" style="background:var(--viz-5)"></div><div class="name">viz-5</div></div>
  <div class="sw"><div class="chip" style="background:var(--viz-6)"></div><div class="name">viz-6</div></div>
  <div class="sw"><div class="chip" style="background:var(--viz-7)"></div><div class="name">viz-7</div></div>
  <div class="sw"><div class="chip" style="background:var(--viz-8)"></div><div class="name">viz-8</div></div>
</div></body></html>
