<!DOCTYPE html>
<html lang="th" data-theme="dark">
<head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-app); font-family: var(--font-sans); }
  .wrap { padding: 24px; display: flex; gap: 18px; align-items: stretch; }
  .panel { flex: 1; border-radius: var(--radius-lg); border: 1px solid var(--border-subtle); display: flex; align-items: center; justify-content: center; gap: 14px; min-height: 120px; }
  .lock { display: flex; align-items: center; gap: 13px; }
  .word { font-size: 27px; font-weight: 600; letter-spacing: -0.02em; }
  .sub { font-size: 11px; letter-spacing: .26em; text-transform: uppercase; margin-top: 3px; }
</style></head>
<body class="vantage"><div class="wrap">
  <div class="panel" style="background:var(--bg-base)">
    <div class="lock">
      <svg width="46" height="46" viewBox="0 0 48 48" fill="none"><rect width="48" height="48" rx="11" fill="#1f6feb"/><path d="M12 31.5L20 22.5L26.5 29L36 16.5" stroke="white" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="36" cy="16.5" r="3" fill="white"/><path d="M12 36.5H36" stroke="white" stroke-opacity="0.45" stroke-width="2.4" stroke-linecap="round"/></svg>
      <div><div class="word" style="color:#fff">Vantage</div><div class="sub" style="color:var(--text-tertiary)">Sales Intelligence</div></div>
    </div>
  </div>
  <div class="panel" style="background:#ffffff;border-color:rgba(0,0,0,.1)">
    <div class="lock">
      <svg width="46" height="46" viewBox="0 0 48 48" fill="none"><rect width="48" height="48" rx="11" fill="#1f6feb"/><path d="M12 31.5L20 22.5L26.5 29L36 16.5" stroke="white" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="36" cy="16.5" r="3" fill="white"/><path d="M12 36.5H36" stroke="white" stroke-opacity="0.45" stroke-width="2.4" stroke-linecap="round"/></svg>
      <div><div class="word" style="color:#11161f">Vantage</div><div class="sub" style="color:#6b7785">Sales Intelligence</div></div>
    </div>
  </div>
  <div class="panel" style="background:#1f6feb;flex:0 0 120px">
    <svg width="50" height="50" viewBox="0 0 48 48" fill="none"><path d="M12 31.5L20 22.5L26.5 29L36 16.5" stroke="white" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/><circle cx="36" cy="16.5" r="3" fill="white"/><path d="M12 36.5H36" stroke="white" stroke-opacity="0.5" stroke-width="2.6" stroke-linecap="round"/></svg>
  </div>
</div></body></html>
