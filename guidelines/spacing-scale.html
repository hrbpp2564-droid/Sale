<!-- @dsCard group="Spacing" viewport="700x160" name="Spacing Scale" subtitle="4px base grid — gaps, padding, layout rhythm" -->
<!DOCTYPE html>
<html lang="th" data-theme="dark">
<head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-app); font-family: var(--font-sans); }
  .wrap { padding: 22px 24px; display: flex; gap: 18px; align-items: flex-end; flex-wrap: wrap; }
  .item { text-align: center; }
  .bar { background: var(--accent); border-radius: 2px; width: 100%; }
  .box { width: 40px; display: flex; align-items: flex-end; height: 64px; }
  .name { font-family: var(--font-numeric); font-size: 11px; color: var(--text-secondary); margin-top: 8px; }
  .px { font-family: var(--font-numeric); font-size: 10px; color: var(--text-tertiary); }
</style></head>
<body class="vantage"><div class="wrap">
  <div class="item"><div class="box"><div class="bar" style="height:4px"></div></div><div class="name">1</div><div class="px">4px</div></div>
  <div class="item"><div class="box"><div class="bar" style="height:8px"></div></div><div class="name">2</div><div class="px">8px</div></div>
  <div class="item"><div class="box"><div class="bar" style="height:12px"></div></div><div class="name">3</div><div class="px">12px</div></div>
  <div class="item"><div class="box"><div class="bar" style="height:16px"></div></div><div class="name">4</div><div class="px">16px</div></div>
  <div class="item"><div class="box"><div class="bar" style="height:20px"></div></div><div class="name">5</div><div class="px">20px</div></div>
  <div class="item"><div class="box"><div class="bar" style="height:24px"></div></div><div class="name">6</div><div class="px">24px</div></div>
  <div class="item"><div class="box"><div class="bar" style="height:32px"></div></div><div class="name">8</div><div class="px">32px</div></div>
  <div class="item"><div class="box"><div class="bar" style="height:40px"></div></div><div class="name">10</div><div class="px">40px</div></div>
  <div class="item"><div class="box"><div class="bar" style="height:48px"></div></div><div class="name">12</div><div class="px">48px</div></div>
  <div class="item"><div class="box"><div class="bar" style="height:64px"></div></div><div class="name">16</div><div class="px">64px</div></div>
</div></body></html>
