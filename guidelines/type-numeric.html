<!-- @dsCard group="Type" viewport="700x180" name="Numeric — Tabular Figures" subtitle="IBM Plex Mono, tabular lining numerals — every KPI & table figure" -->
<!DOCTYPE html>
<html lang="th" data-theme="dark">
<head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-app); font-family: var(--font-sans); }
  .wrap { padding: 22px 24px; display: flex; align-items: flex-end; gap: 36px; flex-wrap: wrap; }
  .num { font-family: var(--font-numeric); font-variant-numeric: tabular-nums lining-nums; letter-spacing: var(--tracking-tight); color: var(--text-primary); }
  .eyebrow { font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 6px; }
  .unit { font-size: var(--text-md); color: var(--text-tertiary); font-weight: 500; }
</style></head>
<body class="vantage"><div class="wrap">
  <div>
    <div class="eyebrow">มูลค่าขายรวม</div>
    <div><span class="num" style="font-size:48px;font-weight:600">847,231,560</span> <span class="unit">บาท</span></div>
  </div>
  <div>
    <div class="eyebrow">ราคาเฉลี่ย</div>
    <div><span class="num" style="font-size:38px;font-weight:600">632.40</span> <span class="unit">฿/Kg</span></div>
  </div>
  <div>
    <div class="eyebrow">เรียงตรงทุกหลัก</div>
    <div class="num" style="font-size:20px;line-height:1.4">
      1,234,567<br/>8,900,012<br/>0,456,789
    </div>
  </div>
</div></body></html>
