<!-- @dsCard group="Spacing" viewport="700x150" name="Corner Radii" subtitle="xs → 2xl + full — controls, cards, pills" -->
<!DOCTYPE html>
<html lang="th" data-theme="dark">
<head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-app); font-family: var(--font-sans); }
  .wrap { padding: 22px 24px; display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
  .item { text-align: center; }
  .box { width: 64px; height: 64px; background: var(--surface-2); border: 1px solid var(--border-strong); }
  .name { font-family: var(--font-numeric); font-size: 11px; color: var(--text-secondary); margin-top: 8px; }
  .px { font-family: var(--font-numeric); font-size: 10px; color: var(--text-tertiary); }
</style></head>
<body class="vantage"><div class="wrap">
  <div class="item"><div class="box" style="border-radius:var(--radius-xs)"></div><div class="name">xs</div><div class="px">3px</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-sm)"></div><div class="name">sm</div><div class="px">5px</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-md)"></div><div class="name">md</div><div class="px">8px</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-lg)"></div><div class="name">lg · card</div><div class="px">12px</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-xl)"></div><div class="name">xl</div><div class="px">16px</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-2xl)"></div><div class="name">2xl</div><div class="px">20px</div></div>
  <div class="item"><div class="box" style="border-radius:var(--radius-full);width:96px"></div><div class="name">full · pill</div><div class="px">999px</div></div>
</div></body></html>
