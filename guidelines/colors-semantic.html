<!-- @dsCard group="Colors" viewport="700x150" name="Semantic — Growth & Status" subtitle="Positive / negative / warning / info — for deltas, alerts, insights" -->
<!DOCTYPE html>
<html lang="th" data-theme="dark">
<head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-app); font-family: var(--font-sans); }
  .wrap { padding: 20px 22px; display: flex; gap: 12px; }
  .sw { flex: 1; border-radius: var(--radius-md); padding: 12px 14px; border: 1px solid var(--border-subtle); }
  .dot { width: 28px; height: 28px; border-radius: var(--radius-sm); margin-bottom: 10px; }
  .name { font-size: var(--text-sm); font-weight: 600; color: var(--text-primary); }
  .val { font-family: var(--font-numeric); font-size: var(--text-2xs); color: var(--text-tertiary); margin-top: 2px; }
  .use { font-size: 11px; color: var(--text-secondary); margin-top: 6px; }
</style></head>
<body class="vantage"><div class="wrap">
  <div class="sw" style="background:var(--positive-subtle)"><div class="dot" style="background:var(--positive)"></div><div class="name" style="color:var(--positive)">Positive</div><div class="val">#3fb950</div><div class="use">เติบโต · ▲ growth</div></div>
  <div class="sw" style="background:var(--negative-subtle)"><div class="dot" style="background:var(--negative)"></div><div class="name" style="color:var(--negative)">Negative</div><div class="val">#f85149</div><div class="use">ลดลง · ▼ decline</div></div>
  <div class="sw" style="background:var(--warning-subtle)"><div class="dot" style="background:var(--warning)"></div><div class="name" style="color:var(--warning)">Warning</div><div class="val">#d29922</div><div class="use">เสี่ยง · alerts</div></div>
  <div class="sw" style="background:var(--info-subtle)"><div class="dot" style="background:var(--info)"></div><div class="name" style="color:var(--info)">Info</div><div class="val">#58a6ff</div><div class="use">ข้อมูล · insights</div></div>
</div></body></html>
