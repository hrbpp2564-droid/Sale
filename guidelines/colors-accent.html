<!-- @dsCard group="Colors" viewport="700x150" name="Brand Accent" subtitle="Electric blue — primary signal color for KPIs, active states, primary series" -->
<!DOCTYPE html>
<html lang="th" data-theme="dark">
<head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-app); font-family: var(--font-sans); }
  .wrap { padding: 20px 22px; }
  .row { display: flex; gap: 10px; }
  .sw { flex: 1; border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--border-subtle); }
  .chip { height: 64px; }
  .meta { padding: 8px 10px; background: var(--surface-1); }
  .name { font-size: var(--text-xs); font-weight: 600; color: var(--text-primary); }
  .val { font-family: var(--font-numeric); font-size: var(--text-2xs); color: var(--text-tertiary); margin-top: 2px; }
</style></head>
<body class="vantage"><div class="wrap"><div class="row">
  <div class="sw"><div class="chip" style="background:var(--blue-700)"></div><div class="meta"><div class="name">blue-700</div><div class="val">#1858c7 · press</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--blue-600)"></div><div class="meta"><div class="name">blue-600 · accent</div><div class="val">#1f6feb · default</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--blue-500)"></div><div class="meta"><div class="name">blue-500</div><div class="val">#388bfd · hover</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--blue-400)"></div><div class="meta"><div class="name">blue-400</div><div class="val">#58a6ff · link</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--blue-300)"></div><div class="meta"><div class="name">blue-300</div><div class="val">#79c0ff</div></div></div>
  <div class="sw"><div class="chip" style="background:var(--accent-subtle)"></div><div class="meta"><div class="name">accent-subtle</div><div class="val">16% tint</div></div></div>
</div></div></body></html>
